# 🐳 SpamShield ML - Production Docker Compose
# Optimized for production deployment with security and performance

version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: spamshield-api-prod
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - MODEL_PATH=/app/models
      - RATE_LIMIT=100
      - CORS_ORIGINS=https://yourdomain.com
    volumes:
      - ../models:/app/models:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - spamshield-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.yourdomain.com
    container_name: spamshield-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.yourdomain.com
    depends_on:
      - api
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spamshield-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  spamshield-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
